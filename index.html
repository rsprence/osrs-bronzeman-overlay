<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, initial-scale=1.0" />
    <title>OSRS Bronzeman Unlock Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- OBS Browser Source: progress board -->
    <div id="overlay-view" class="hidden">
      <div class="osrs-panel">
        <h1 class="osrs-title">Bronzeman Unlocks</h1>

        <div class="summary-bar" id="overlay-summary"></div>
        <div class="item-grid overlay-grid" id="overlay-grid"></div>
      </div>
    </div>

    <!-- OBS Browser Source: unlock celebration only (transparent until unlock) -->
    <div id="celebration-view" class="hidden">
      <div id="unlock-celebration" class="unlock-celebration hidden" aria-hidden="true">
        <div class="unlock-celebration__backdrop"></div>
        <div class="unlock-celebration__vignette"></div>
        <div class="unlock-celebration__rays" aria-hidden="true"></div>
        <div class="unlock-celebration__scanlines" aria-hidden="true"></div>
        <canvas class="unlock-celebration__particles" width="1920" height="1080"></canvas>
        <div class="unlock-celebration__flash"></div>
        <div class="unlock-celebration__content">
          <div class="unlock-celebration__ring"></div>
          <div class="unlock-celebration__icon-wrap">
            <img class="unlock-celebration__icon" alt="" width="128" height="128" />
          </div>
          <p class="unlock-celebration__banner">UNLOCKED</p>
          <h2 class="unlock-celebration__name"></h2>
          <p class="unlock-celebration__cost"></p>
        </div>
      </div>
    </div>

    <!-- Streamer control: index.html?view=control -->
    <div id="control-view" class="hidden">
      <div class="osrs-panel">
        <h1 class="osrs-title">Unlock Control</h1>
        <p class="osrs-subtitle">Click a row to toggle locked / unlocked</p>

        <div id="room-panel" class="room-panel hidden"></div>

        <div class="summary-bar" id="control-summary"></div>

        <div class="control-actions">
          <button type="button" class="osrs-btn" id="btn-lock-all">Lock All</button>
          <button type="button" class="osrs-btn danger" id="btn-reset">Reset All</button>
        </div>

        <div class="item-grid control-grid" id="control-grid"></div>

        <p class="control-hint">
          Click a room URL above to copy. OBS celebration stays blank until an unlock fires.
        </p>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
